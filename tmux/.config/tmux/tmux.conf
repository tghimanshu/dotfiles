# set -g default-terminal "tmux-256color"
# added for true color support for moonfly neovim theme
# set -ga terminal-overrides ',xterm-256color:Tc'

set -s escape-time 0
set -g base-index 1
set -g mouse on

#default name for new windows
set-option -g set-titles on
set-option -g set-titles-string "Tab #W"

# optional -- i like C-a not C-b (pure preference)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# vi key movement for copy/pasta mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# <WHERE YOUR TMUX CONF GOES> = XDG_CONFIG_HOME/tmux/tmux.conf
# <WHERE YOUR TMUX CONF GOES> = ~/.tmux.conf
bind r source-file $HOME/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# Add to your tmux.conf file
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# forget the find window.  That is for chumps
bind-key -r f run-shell "export FZF_DEFAULT_OPTS=--reverse && tmux neww ~/.local/scripts/tmux-sessionizer"

set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'vaaleyard/tmux-dotbar'
set -g @plugin 'catppuccin/tmux#v2.1.3' # See https://github.com/catppuccin/tmux/tags for additional tags
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# ----- DOTBAR CONFIGURATION -----
# Configure the tmux-dotbar plugin
# set -g @tmux-dotbar-bold-status true
# set -g @tmux-dotbar-bold-current-window false

# ----- CATPPUCCIN CONFIGURATION -----
# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catpuccin_sstatus_background none
# run ~/.tmux/plugins/tmux/catppuccin.tmux

set -g status-position bottom
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""

# # 1. Configure the date_time module to match your desired format
# # We include the clock icon inside the text string to match your layout
# set -g @catppuccin_date_time_text " %b %d 󰅐 %H:%M"
#
# # 2. Set the main icon for the module (the calendar icon)
# set -g @catppuccin_date_time_icon "󰭦 "
#
# # 3. Load the modules using the Catppuccin syntax
# set -g status-right "#{E:@catppuccin_status_application}#{E:@catppuccin_status_date_time}"


# 1. Strip the Time from the standard Date module
# This makes the first pill only show the Calendar and Date
set -g @catppuccin_date_time_icon "󰭦 "
set -g @catppuccin_date_time_text " %b %d"

# 2. Define the "Time" pill manually in status-right
# We construct the pill structure: [Round-Separator] [Icon-Block] [Text-Block] [Round-Separator]
# I've used @thm_teal for the clock background to distinguish it, but you can change it to @thm_blue.

set -g status-right "#{E:@catppuccin_status_application} #{E:@catppuccin_status_date_time} #[fg=#{@thm_teal},bg=default]#[fg=#{@thm_crust},bg=#{@thm_teal}]󰅐 #[fg=#{@thm_fg},bg=#{@thm_bg}] %H:%M "
# set -g status-right "#{E:@catppuccin_status_application} #[bg=#{@thm_bg},fg=#{@thm_blue}] 󰭦 %b %d 󰅐 %H:%M"
set -g @catppuccin_window_default_text " #{b:pane_current_path}"
set -g @catppuccin_window_current_text " #{b:pane_current_path}"
set -g @catppuccin_window_text " #{b:pane_current_path}"
set -g @catppuccin_window_current_number_color "#00AA00"

bind-key c new-window -n 'zsh'

run '~/.local/share/tmux/tpm'


